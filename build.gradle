plugins {
    id 'maven-publish'
}

group = 'com.github.CENTURYCLOUD'
version = '2026.02.25.COMBO' // Nombre nuevo para no usar caché vieja

publishing {
    publications {
        maven(MavenPublication) {
            groupId = 'com.github.CENTURYCLOUD'
            artifactId = 'zebra-all'
            version = '2026.02.25.COMBO'
            
            // Los tres en el mismo paquete
            artifact("libs/API3_READER-release-2.0.2.124.aar") { classifier "reader" }
            artifact("libs/API3_CMN-release-2.0.2.124.aar") { classifier "common" }
            artifact("libs/API3_TRANSPORT-release-2.0.2.124.aar") { classifier "transport" }
        }
    }
}

task clean(type: Delete) { delete rootProject.buildDir }
task assemble {}