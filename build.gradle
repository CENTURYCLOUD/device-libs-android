plugins {
    id 'maven-publish'
}

group = 'com.github.CENTURYCLOUD'
version = '2026.02.25'

publishing {
    publications {
        zebraReader(MavenPublication) {
            groupId = 'com.github.CENTURYCLOUD'
            artifactId = 'zebra-reader'
            version = '2.0.2.124'
            artifact("libs/API3_READER-release-2.0.2.124.aar")
        }
        zebraCommon(MavenPublication) {
            groupId = 'com.github.CENTURYCLOUD'
            artifactId = 'zebra-common'
            version = '2.0.2.124'
            artifact("libs/API3_CMN-release-2.0.2.124.aar")
        }
        zebraTransport(MavenPublication) {
            groupId = 'com.github.CENTURYCLOUD'
            artifactId = 'zebra-transport'
            version = '2.0.2.124'
            artifact("libs/API3_TRANSPORT-release-2.0.2.124.aar")
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}