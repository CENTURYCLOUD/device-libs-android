plugins {
    id 'maven-publish'
}

group = 'com.github.CENTURYCLOUD'
version = '2026.02.25.TRP' // Versión específica para Transport

publishing {
    publications {
        maven(MavenPublication) {
            groupId = 'com.github.CENTURYCLOUD'
            artifactId = 'device-zebra-transport' 
            version = '2026.02.25.TRP'
            artifact("libs/API3_TRANSPORT-release-2.0.2.124.aar")
        }
    }
}

task clean(type: Delete) { delete rootProject.buildDir }
task assemble {}