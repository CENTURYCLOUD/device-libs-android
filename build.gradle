plugins {
    id 'maven-publish'
}

group = 'com.github.CENTURYCLOUD'
version = '2026.02.25.CMN' // Versión específica para esta pieza

publishing {
    publications {
        maven(MavenPublication) {
            groupId = 'com.github.CENTURYCLOUD'
            artifactId = 'device-zebra-cmn' 
            version = '2026.02.25.CMN'
            artifact("libs/API3_CMN-release-2.0.2.124.aar")
        }
    }
}

task clean(type: Delete) { delete rootProject.buildDir }
task assemble {}