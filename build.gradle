plugins {
    id 'maven-publish'
}

group = 'com.github.CENTURYCLOUD'
version = '2026.02.25.FINAL' // Cambiamos versión para limpiar caché

publishing {
    publications {
        maven(MavenPublication) {
            groupId = 'com.github.CENTURYCLOUD'
            artifactId = 'device-zebra-reader' // Usamos el nombre del repo directamente
            version = '2026.02.25.FINAL'
            artifact("libs/API3_READER-release-2.0.2.124.aar")
        }
    }
}

task clean(type: Delete) { delete rootProject.buildDir }
task assemble {}