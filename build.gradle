plugins {
    id 'maven-publish'
}

group = 'com.github.CENTURYCLOUD'
version = 'ZEBRA-V7' // <--- La versión base del proyecto ahora es el Tag

publishing {
    publications {
        reader(MavenPublication) {
            groupId = 'com.github.CENTURYCLOUD'
            artifactId = 'zebra-reader-lib'
            version = 'ZEBRA-V7' // <--- Fijo aquí también
            artifact("libs/API3_READER-release-2.0.2.124.aar")
        }
        common(MavenPublication) {
            groupId = 'com.github.CENTURYCLOUD'
            artifactId = 'zebra-common-lib'
            version = 'ZEBRA-V7' // <--- Fijo aquí también
            artifact("libs/API3_CMN-release-2.0.2.124.aar")
        }
        transport(MavenPublication) {
            groupId = 'com.github.CENTURYCLOUD'
            artifactId = 'zebra-transport-lib'
            version = 'ZEBRA-V7' // <--- Fijo aquí también
            artifact("libs/API3_TRANSPORT-release-2.0.2.124.aar")
        }
    }
}

task install {}
task assemble {}